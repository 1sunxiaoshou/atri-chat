providers:
  - provider_id: "openai"
    name: "OpenAI"
    description: "OpenAI 官方服务，支持 GPT-4o, o1, o3 等模型"
    lc_id: "openai"
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
        description: "API Key"
      - field_name: "base_url"
        field_type: "string"
        default_value: "https://api.openai.com/v1"
        description: "API 基础地址"

  - provider_id: "deepseek"
    name: "DeepSeek"
    description: "深度求索，高性价比推理模型"
    lc_id: "openai"
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
      - field_name: "base_url"
        field_type: "string"
        default_value: "https://api.deepseek.com/v1"

  - provider_id: "anthropic"
    name: "Anthropic"
    description: "Claude 系列模型，具备极强的推理与多模态能力"
    lc_id: "anthropic"
    discovery: "none" # Anthropic doesn't have a public models list API easily accessible via OpenAI compat
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true

  - provider_id: "google"
    name: "Google Gemini"
    description: "Google Generative AI (Gemini)"
    lc_id: "google_genai"
    discovery: "google"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true

  - provider_id: "ollama"
    name: "Ollama"
    description: "本地 Llama 运行环境"
    lc_id: "ollama"
    discovery: "ollama"
    config_fields:
      - field_name: "base_url"
        field_type: "string"
        default_value: "http://localhost:11434"
      - field_name: "api_key"
        field_type: "string"
        required: false
        sensitive: true

  - provider_id: "qwen"
    name: "Qwen (DashScope)"
    description: "阿里通义千问"
    lc_id: "openai"
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
      - field_name: "base_url"
        field_type: "string"
        default_value: "https://dashscope.aliyuncs.com/compatible-mode/v1"

  - provider_id: "groq"
    name: "Groq"
    description: "极速推理引擎"
    lc_id: "openai"
    discovery: "openai"
    config_fields:
      - field_name: "api_key"
        field_type: "string"
        required: true
        sensitive: true
      - field_name: "base_url"
        field_type: "string"
        default_value: "https://api.groq.com/openai/v1"
