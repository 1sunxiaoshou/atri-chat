<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-8">

    <div class="max-w-7xl mx-auto">
        <!-- 标题栏 -->
        <div class="flex items-center gap-3 mb-8">
            <h2 class="text-xl font-bold text-gray-900">角色管理</h2>
            <span class="px-2.5 py-0.5 rounded-full bg-gray-100 text-xs text-gray-500 font-medium border border-gray-200">12 个角色</span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">

            <!-- ================= 卡片 1 ================= -->
            <div class="group relative bg-white border border-gray-200 rounded-xl p-3 
                        transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:border-blue-300 cursor-pointer">
                
                <!-- 1. 立绘区域 (保留圆角结构) -->
                <div class="relative w-full aspect-[3/4] rounded-lg overflow-hidden bg-gray-100">
                    <img src="https://images.unsplash.com/photo-1634926878768-2a5b3c426d0d?q=80&w=600&auto=format&fit=crop" 
                         class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                    
                    <!-- 删除按钮：位置不变，风格变软 -->
                    <button class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center 
                                   bg-white/90 backdrop-blur-sm border border-gray-200 rounded-lg text-gray-400
                                   opacity-0 group-hover:opacity-100 transition-all duration-200
                                   hover:bg-red-50 hover:text-red-500 hover:border-red-200 shadow-sm"
                            title="删除">
                        <i class="ph-bold ph-trash text-lg"></i>
                    </button>
                </div>

                <!-- 2. 底部信息区域 (保留原布局) -->
                <div class="mt-3 flex justify-between items-end">
                    <div class="flex flex-col gap-1.5 overflow-hidden">
                        <!-- 名字 -->
                        <h3 class="text-lg font-bold text-gray-900 truncate">Kiro</h3>
                        
                        <!-- 标签组 -->
                        <div class="flex flex-wrap gap-1.5">
                            <!-- 音色标签 (紫色系) -->
                            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-medium bg-purple-50 text-purple-600 border border-purple-100">
                                <i class="ph-bold ph-microphone-stage"></i> Clone
                            </span>
                            <!-- 模型标签 (蓝色系) -->
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-medium bg-blue-50 text-blue-600 border border-blue-100">
                                GPT-4
                            </span>
                        </div>
                    </div>

                    <!-- 3. 进入按钮 (保留右下角独立按钮结构) -->
                    <!-- 风格改为：浅蓝背景 + 蓝色图标 -->
                    <div class="w-10 h-10 flex-shrink-0 flex items-center justify-center 
                                bg-blue-50 text-blue-600 rounded-lg border border-blue-100
                                group-hover:bg-blue-600 group-hover:text-white group-hover:border-blue-600 group-hover:shadow-md
                                transition-all duration-300">
                        <i class="ph-bold ph-arrow-right text-lg"></i>
                    </div>
                </div>
            </div>


            <!-- ================= 卡片 2 ================= -->
            <div class="group relative bg-white border border-gray-200 rounded-xl p-3 
                        transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:border-blue-300 cursor-pointer">
                
                <div class="relative w-full aspect-[3/4] rounded-lg overflow-hidden bg-gray-100">
                    <img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=600&auto=format&fit=crop" 
                         class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                    
                    <button class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center 
                                   bg-white/90 backdrop-blur-sm border border-gray-200 rounded-lg text-gray-400
                                   opacity-0 group-hover:opacity-100 transition-all duration-200
                                   hover:bg-red-50 hover:text-red-500 hover:border-red-200 shadow-sm">
                        <i class="ph-bold ph-trash text-lg"></i>
                    </button>
                </div>

                <div class="mt-3 flex justify-between items-end">
                    <div class="flex flex-col gap-1.5 overflow-hidden">
                        <h3 class="text-lg font-bold text-gray-900 truncate">赛博杀手</h3>
                        <div class="flex flex-wrap gap-1.5">
                             <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-medium bg-gray-100 text-gray-600 border border-gray-200">
                                <i class="ph-bold ph-speaker-high"></i> Preset
                            </span>
                        </div>
                    </div>

                    <div class="w-10 h-10 flex-shrink-0 flex items-center justify-center 
                                bg-blue-50 text-blue-600 rounded-lg border border-blue-100
                                group-hover:bg-blue-600 group-hover:text-white group-hover:border-blue-600 group-hover:shadow-md
                                transition-all duration-300">
                        <i class="ph-bold ph-arrow-right text-lg"></i>
                    </div>
                </div>
            </div>

            <!-- ================= 新建卡片 ================= -->
            <div class="group relative border border-dashed border-gray-300 rounded-xl p-3 flex flex-col items-center justify-center
                        hover:border-blue-500 hover:bg-blue-50/30 transition-all duration-300 cursor-pointer min-h-[340px]">
                
                <div class="w-14 h-14 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center mb-3
                            group-hover:bg-white group-hover:border-blue-200 group-hover:text-blue-600 group-hover:scale-110 group-hover:shadow-md transition-all">
                    <i class="ph-bold ph-plus text-2xl text-gray-400 group-hover:text-blue-600"></i>
                </div>
                <h3 class="text-sm font-bold text-gray-600 group-hover:text-blue-700">新建角色</h3>
            </div>

        </div>
    </div>
</body>
</html>
